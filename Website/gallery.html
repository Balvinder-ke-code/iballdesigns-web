<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iBall Designs | My Gallery</title>
    <!-- Modern Google Font: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo" style="color: white; text-decoration: none;">iBall</a>
        <div class="nav-links">
            <a href="index.html#contact" class="nav-contact">Contact us</a>
            <a href="gallery.html" class="btn btn-secondary nav-btn">All Designs</a>
        </div>
    </nav>

    <!-- My Gallery Section -->
    <section class="gallery-section">
        <div class="gallery-header">
            <h2 class="section-title main-title-gradient">My Gallery</h2>
            <p class="section-description">A curated collection of my visual work, designs, and selected aesthetics.</p>
        </div>

        <div class="bento-grid">
            <!-- Large Item -->
            <div class="bento-item large">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1200&q=80"
                    alt="Gallery Placeholder 1">
            </div>

            <!-- Standard Items -->
            <div class="bento-item">
                <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=600&q=80"
                    alt="Gallery Placeholder 2">
            </div>
            <div class="bento-item tall">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80"
                    alt="Gallery Placeholder 3">
            </div>
            <div class="bento-item">
                <img src="https://images.unsplash.com/photo-1633511090164-b448b173cc41?auto=format&fit=crop&w=600&q=80"
                    alt="Gallery Placeholder 4">
            </div>

            <!-- Wide Item -->
            <div class="bento-item wide">
                <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1200&q=80"
                    alt="Gallery Placeholder 5">
            </div>

            <!-- More Standard Items -->
            <div class="bento-item">
                <img src="https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&w=600&q=80"
                    alt="Gallery Placeholder 6">
            </div>
            <div class="bento-item">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80"
                    alt="Gallery Placeholder 7">
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-left">
                <div class="logo">iBall</div>
                <p>&copy; 2026 iBall Designs.</p>
            </div>
            <div class="footer-center">
                <a href="index.html#work">Work</a>
                <a href="index.html#about">About</a>
                <a href="index.html#contact">Contact</a>
            </div>
            <div class="footer-right">
                <a href="#">Behance</a>
                <a href="#">Dribbble</a>
                <a href="#">Twitter</a>
                <a href="#">LinkedIn</a>
            </div>
        </div>
    </footer>

    <!-- Image Modal -->
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage" alt="Enlarged Image">
    </div>

    <script src="script.js"></script>
</body>

</html>
